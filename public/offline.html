<!doctype html>
<html lang="bs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Nema veze — Konto</title>
    <meta name="theme-color" content="#0A0A0B" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/icons/icon-192.png" />
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
          'Helvetica Neue', sans-serif;
        background: #ffffff;
        color: #0a0a0b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0b;
          color: #f7f7f7;
        }
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        display: block;
        border-radius: 14px;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
      }
      p {
        font-size: 1rem;
        line-height: 1.5;
        margin: 0 0 1.5rem;
        color: #525252;
      }
      @media (prefers-color-scheme: dark) {
        p {
          color: #a3a3a3;
        }
      }
      button {
        font: inherit;
        font-weight: 500;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        border: 1px solid transparent;
        background: #22c55e;
        color: #0a0a0b;
        cursor: pointer;
      }
      button:hover {
        background: #16a34a;
      }
      button:focus-visible {
        outline: 2px solid #22c55e;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" class="logo" />
      <h1>Trenutno ste van mreže</h1>
      <p>
        Nema internet veze, pa ne možemo prikazati svježe podatke. Provjerite vezu i pokušajte
        ponovo.
      </p>
      <button type="button" onclick="location.reload()">Pokušaj ponovo</button>
    </main>
  </body>
</html>
