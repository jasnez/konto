<!doctype html>
<html lang="bs">
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #111; max-width: 480px; margin: 0 auto; padding: 24px;">
    <h2 style="margin: 0 0 16px;">Prijava u Konto</h2>
    <p style="margin: 0 0 8px;">Tvoj 6-cifreni kod:</p>
    <p style="font-size: 28px; font-weight: 700; letter-spacing: 4px; margin: 0 0 24px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;">{{ .Token }}</p>
    <p style="margin: 0 0 16px;">Ili klikni za prijavu: <a href="{{ .ConfirmationURL }}" style="color: #2563eb;">Prijavi se</a></p>
    <p style="color: #666; font-size: 13px; margin: 24px 0 0;">Kod vrijedi 15 minuta. Ako nisi tražio prijavu, ignoriši ovu poruku.</p>
  </body>
</html>
